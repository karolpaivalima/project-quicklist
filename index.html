<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quicklist</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <img src="./img/logo.png" alt="Logo do Quicklist">
    </header>

    <main>
        <section class="adicionar-item">
            <h1>Compras da semana</h1>

            <div>
                <input type="text" id="item" placeholder="Adicione um novo item">
                <button>Adicionar item</button>
            </div>
        </section>

        <section class="lista">

            <div class="item">
                <div>
                    <input type="checkbox" id="item-1">
                    <label for="item-1">Pão de forma</label>
                </div>
                <button>
                    <img src="./imagens/trash-icon.svg" alt="Excluir item">
                </button>
            </div>

            <div class="item">
                <div>
                    <input type="checkbox" id="item-2">
                    <label for="item-2">Café Preto</label>
                </div>
                <button>
                    <img src="./imagens/trash-icon.svg" alt="Excluir item">
                </button>
            </div>

            <div class="item">
                <div>
                    <input type="checkbox" id="item-3">
                    <label for="item-3">Suco de Laranja</label>
                </div>
                <button>
                    <img src="./imagens/trash-icon.svg" alt="Excluir item">
                </button>
            </div>

        </section>
    </main>
</body>
</html>
